# 拾艺局 Secret 配置
# 注意：在生产环境中应使用 sealed-secrets 或 Vault 管理密钥

apiVersion: v1
kind: Secret
metadata:
  name: shiyiju-secrets
  namespace: shiyiju
type: Opaque
stringData:
  # MySQL 密钥
  MYSQL_ROOT_PASSWORD: "root123456"
  MYSQL_USER: "shiyiju"
  MYSQL_PASSWORD: "shiyiju123"
  
  # Redis 密钥（无密码留空）
  REDIS_PASSWORD: ""
  
  # Nacos 密钥
  NACOS_PASSWORD: "nacos"
  
  # 微信支付密钥（需要替换为实际值）
  WX_APP_ID: "your-wx-app-id"
  WX_MCH_ID: "your-mch-id"
  WX_API_KEY: "your-api-key"
  WX_NOTIFY_URL: "https://your-domain.com/api/order/pay/callback"