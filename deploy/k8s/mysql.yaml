# 拾艺局 MySQL 部署配置

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: shiyiju
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: MYSQL_PASSWORD
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-authentication-plugin=mysql_native_password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init-script

---
# MySQL Service
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: shiyiju
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
  selector:
    app: mysql

---
# MySQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: shiyiju
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# MySQL ConfigMap (初始化脚本)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: shiyiju
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS shiyiju DEFAULT CHARACTER SET utf8mb4;
    
    USE shiyiju;
    
    -- 管理员表
    CREATE TABLE IF NOT EXISTS `admins` (
      `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
      `username` VARCHAR(64) UNIQUE NOT NULL,
      `password` VARCHAR(128) NOT NULL,
      `real_name` VARCHAR(64),
      `role` VARCHAR(32) DEFAULT 'admin',
      `status` TINYINT DEFAULT 1,
      `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    INSERT INTO `admins` (`username`, `password`, `real_name`) VALUES
    ('admin', '$2a$10$N.zmdr9k7uOCQb376NoUnuTJ8iAt6Z5EHsM8lE9lBOsl7iAt6Z5EH', '管理员');