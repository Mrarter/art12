# 拾艺局 Ingress 配置
# 用于外部访问 API 和前端

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shiyiju-ingress
  namespace: shiyiju
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    # API 网关
    - host: api.shiyiju.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
            # 限流注释
    # 前端 H5
    - host: www.shiyiju.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    # 管理后台
    - host: admin.shiyiju.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 80

---
# 前端 Service (H5)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shiyiju
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend

---
# 前端 Deployment (H5)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shiyiju
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shiyiju/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
# 管理后台前端 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: shiyiju
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
        - name: admin-frontend
          image: shiyiju/admin-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
# 管理后台前端 Service
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
  namespace: shiyiju
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: admin-frontend