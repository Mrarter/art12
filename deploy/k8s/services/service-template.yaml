# 拾艺局微服务通用 Deployment 模板
# 每个服务都继承此基础配置

apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: shiyiju
  labels:
    app: SERVICE_NAME
    version: v1
spec:
  replicas: REPLICA_COUNT
  selector:
    matchLabels:
      app: SERVICE_NAME
  template:
    metadata:
      labels:
        app: SERVICE_NAME
        version: v1
    spec:
      containers:
        - name: SERVICE_NAME
          image: shiyiju/SERVICE_NAME:latest
          imagePullPolicy: Always
          ports:
            - containerPort: CONTAINER_PORT
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: NACOS_SERVER_ADDR
            - name: NACOS_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: NACOS_USERNAME
            - name: NACOS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: NACOS_PASSWORD
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shiyiju-secrets
                  key: MYSQL_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: REDIS_PORT
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: CONTAINER_PORT
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: CONTAINER_PORT
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - SERVICE_NAME
                topologyKey: kubernetes.io/hostname

---
# Service 配置
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: shiyiju
spec:
  type: ClusterIP
  ports:
    - port: SERVICE_PORT
      targetPort: CONTAINER_PORT
      name: http
  selector:
    app: SERVICE_NAME