# 拾艺局 Gateway 网关服务部署

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: shiyiju
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: shiyiju/gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: NACOS_SERVER_ADDR
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: shiyiju-config
                  key: TZ
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: shiyiju
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: gateway