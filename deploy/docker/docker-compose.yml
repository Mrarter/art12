# 拾艺局 Docker Compose 编排
# 支持本地开发/测试环境一键启动

version: '3.8'

services:
  # ==================== 基础设施 ====================
  
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: shiyiju-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - shiyiju-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: shiyiju-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shiyiju-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nacos 注册中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: shiyiju-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: ${MYSQL_USER}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
      NACOS_AUTH_ENABLE: false
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    networks:
      - shiyiju-net

  # ==================== 后端微服务 ====================

  # API 网关
  gateway:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 用户服务
  user:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-user
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 商品服务
  product:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-product
    restart: unless-stopped
    expose:
      - "8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 订单服务
  order:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-order
    restart: unless-stopped
    expose:
      - "8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 拍卖服务
  auction:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-auction
    restart: unless-stopped
    expose:
      - "8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 分销服务
  promotion:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-promotion
    restart: unless-stopped
    expose:
      - "8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 社区服务
  community:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-community
    restart: unless-stopped
    expose:
      - "8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 文件服务
  file:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-file
    restart: unless-stopped
    expose:
      - "8087"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 消息服务
  message:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-message
    restart: unless-stopped
    expose:
      - "8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # 管理后台
  admin:
    build:
      context: ../../backend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-admin
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shiyiju
      REDIS_HOST: redis
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - shiyiju-net

  # ==================== 前端服务 ====================

  # 小程序前端 (H5 模式)
  frontend:
    build:
      context: ../../frontend
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - shiyiju-net

  # 管理后台前端
  admin-frontend:
    build:
      context: ../../admin
      dockerfile: deploy/docker/Dockerfile
    container_name: shiyiju-admin-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      VITE_API_BASE_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - shiyiju-net

# ==================== 网络与存储 ====================

networks:
  shiyiju-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs: