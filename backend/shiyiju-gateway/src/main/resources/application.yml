server:
  port: 8080

spring:
  application:
    name: shiyiju-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户服务
        - id: shiyiju-user
          uri: lb://shiyiju-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        # 商品服务
        - id: shiyiju-product
          uri: lb://shiyiju-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1
        # 订单服务
        - id: shiyiju-order
          uri: lb://shiyiju-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        # 拍卖服务
        - id: shiyiju-auction
          uri: lb://shiyiju-auction
          predicates:
            - Path=/api/auction/**
          filters:
            - StripPrefix=1
        # 分销服务
        - id: shiyiju-promotion
          uri: lb://shiyiju-promotion
          predicates:
            - Path=/api/promotion/**
          filters:
            - StripPrefix=1
        # 社区服务
        - id: shiyiju-community
          uri: lb://shiyiju-community
          predicates:
            - Path=/api/community/**
          filters:
            - StripPrefix=1
        # 消息服务
        - id: shiyiju-message
          uri: lb://shiyiju-message
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1
        # 文件服务
        - id: shiyiju-file
          uri: lb://shiyiju-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
