server:
  port: 8080

spring:
  application:
    name: shiyiju-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # 用户服务
        - id: shiyiju-user
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        # 商品服务
        - id: shiyiju-product
          uri: http://localhost:8082
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1
        # 订单服务
        - id: shiyiju-order
          uri: http://localhost:8082
          predicates:
            - Path=/api/order/**
        # 拍卖服务
        - id: shiyiju-auction
          uri: http://localhost:8082
          predicates:
            - Path=/api/auction/**
          filters:
            - StripPrefix=1
        # 分销服务
        - id: shiyiju-promotion
          uri: http://localhost:8082
          predicates:
            - Path=/api/promotion/**
          filters:
            - StripPrefix=1
        # 社区服务
        - id: shiyiju-community
          uri: http://localhost:8082
          predicates:
            - Path=/api/community/**
          filters:
            - StripPrefix=1
        # 消息服务
        - id: shiyiju-message
          uri: http://localhost:8082
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1
        # 文件服务
        - id: shiyiju-file
          uri: http://localhost:8082
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1
        # 运营后台管理接口（配置管理）
        - id: shiyiju-admin-config
          uri: http://localhost:8090
          predicates:
            - Path=/api/admin/config/**
          filters:
            - RewritePath=/api/admin(?<segment>/?.*), $\{segment}
        # 运营后台 - 用户与艺术家管理
        - id: shiyiju-admin-user
          uri: http://localhost:8090
          predicates:
            - Path=/api/admin/user/**
          filters:
            - RewritePath=/api/admin(?<segment>/?.*), $\{segment}
        # 运营后台 - 其他管理接口
        - id: shiyiju-admin
          uri: http://localhost:8090
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  data:
    redis:
    host: 127.0.0.1
    port: 6379
    database: 0

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
