server:
  port: 8083
spring:
  application:
    name: shiyiju-order
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shiyiju?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123456
  data:
    redis:
    host: 127.0.0.1
    port: 6379
    database: 0
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shiyiju.order.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
logging:
  level:
    com.shiyiju: DEBUG

# ==================== 微信支付配置 ====================
wxpay:
  # 商户号
  mch-id: WECHAT_MCH_ID
  # 商户密钥
  mch-key: WECHAT_MCH_KEY
  # 公众号AppID (如有)
  app-id: WECHAT_APP_ID
  # 小程序AppID
  mini-app-id: WECHAT_MINI_APP_ID
  # API密钥 (V2)
  api-key: WECHAT_API_KEY
  # 证书路径 (退款需要)
  key-path: /path/to/apiclient_cert.p12
  # 回调地址 (需要公网可访问)
  notify-url: https://your-domain.com/pay/callback/notify
  # 交易类型
  trade-type: JSAPI
  # API版本
  version: v2
