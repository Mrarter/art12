server:
  port: 8082
spring:
  application:
    name: shiyiju-product
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shiyiju_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shiyiju.product.entity
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.shiyiju: DEBUG

# 七牛云配置
qiniu:
  access-key: your_access_key
  secret-key: your_secret_key
  bucket: shiyiju
  cdn: http://your-cdn-domain.com
