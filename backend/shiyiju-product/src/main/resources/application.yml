# ============================================
# 价格增长机制配置
# ============================================
price:
  growth:
    # 是否启用价格增长
    enabled: true
    
    # 时间因素
    base-daily-rate: 0.0002          # 基础日增长率 0.02%/天
    mature-daily-rate: 0.0003        # 成熟期日增长率 0.03%/天
    mature-days: 30                   # 成熟期天数阈值
    
    # 艺术家知名度系数
    default-badge-rate: 1.0           # 普通艺术家
    verified-badge-rate: 1.5          # 认证艺术家
    popular-badge-rate: 2.0           # 人气艺术家
    master-badge-rate: 3.0            # 大师级艺术家
    
    # 浏览量阈值
    view-threshold-1: 100
    view-rate-1: 1.1
    view-threshold-2: 500
    view-rate-2: 1.2
    view-threshold-3: 1000
    view-rate-3: 1.3
    view-threshold-4: 5000
    view-rate-4: 1.5
    
    # 收藏量阈值
    favorite-threshold-1: 5
    favorite-rate-1: 1.1
    favorite-threshold-2: 20
    favorite-rate-2: 1.2
    favorite-threshold-3: 50
    favorite-rate-3: 1.3
    favorite-threshold-4: 100
    favorite-rate-4: 1.5
    
    # 销售加成
    sale-rate: 0.05                   # 单次销售加成 5%
    max-sale-count: 10                # 最多计算销售次数
    
    # 涨幅限制
    max-growth-multiple: 5.0          # 最大涨幅 5 倍原价

# ============================================
# 分销佣金配置
# ============================================
promotion:
  commission:
    direct-rate: 0.05                 # 一级佣金 5%
    team-rate: 0.02                  # 二级团队奖励 2%
    settlement-type: after_pay        # 结算时机: after_pay/after_confirm/after_refund
  withdraw:
    min-amount: 100                   # 最低提现金额
    fee-rate: 0                      # 提现手续费率
    days: 3                           # 提现到账周期（天）
