server:
  port: 8082
spring:
  application:
    name: shiyiju-product
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shiyiju?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shiyiju.product.entity
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.shiyiju: DEBUG
  file:
    name: /Users/master/CodeBuddy/art12/logs/product.log
    max-size: 10MB
    max-history: 30

# 本地文件存储配置（替代七牛云）
upload:
  local:
    path: /Users/master/CodeBuddy/art12/uploads
  cdn-url: http://localhost:8087

# 七牛云配置（已弃用，保留占位符避免编译错误）
qiniu:
  access-key: placeholder
  secret-key: placeholder
  bucket: placeholder
  cdn: http://placeholder.com
