server:
  port: 8087
spring:
  application:
    name: shiyiju-file
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shiyiju?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
# 文件上传配置
upload:
  storage-type: local
  local:
    path: /Users/master/CodeBuddy/art12/uploads
  cdn-url: http://192.168.1.109:8087
  max-image-size: 10485760
  max-video-size: 104857600
tencent:
  cos:
    secret-id: your-secret-id
    secret-key: your-secret-key
    bucket: shiyiju-files
    region: ap-guangzhou
    cdn: https://cdn.shiyiju.com
logging:
  level:
    com.shiyiju: DEBUG
