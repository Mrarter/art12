server:
  port: 8088
spring:
  application:
    name: shiyiju-file
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
tencent:
  cos:
    secret-id: your-secret-id
    secret-key: your-secret-key
    bucket: shiyiju-files
    region: ap-guangzhou
    cdn: https://cdn.shiyiju.com
logging:
  level:
    com.shiyiju: DEBUG
