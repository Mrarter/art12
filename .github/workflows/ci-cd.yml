# 拾艺局 CI/CD 配置
# GitHub Actions 工作流

name: Shiyiju CI/CD

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== 后端构建 ====================
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -DskipTests -B

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 为每个服务构建并推送镜像
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.sha }}
          build-args: SERVICE=gateway

      - name: Build and push User
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user:${{ github.sha }}
          build-args: SERVICE=user

      - name: Build and push Product
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/product:${{ github.sha }}
          build-args: SERVICE=product

      - name: Build and push Order
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/order:${{ github.sha }}
          build-args: SERVICE=order

      - name: Build and push Auction
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auction:${{ github.sha }}
          build-args: SERVICE=auction

      - name: Build and push Promotion
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/promotion:${{ github.sha }}
          build-args: SERVICE=promotion

      - name: Build and push Community
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/community:${{ github.sha }}
          build-args: SERVICE=community

      - name: Build and push File
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/file:${{ github.sha }}
          build-args: SERVICE=file

      - name: Build and push Message
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/message:${{ github.sha }}
          build-args: SERVICE=message

      - name: Build and push Admin
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin:${{ github.sha }}
          build-args: SERVICE=admin

  # ==================== 前端构建 ====================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

  # ==================== 部署到 K8s ====================
  deploy:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update image tags
        run: |
          # 更新所有服务的镜像版本
          for service in gateway user product order auction promotion community file message admin; do
            kubectl set image deployment/$service $service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service:${{ github.sha }} -n shiyiju
          done
          
          # 更新前端镜像
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n shiyiju
          kubectl set image deployment/admin-frontend admin-frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n shiyiju

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n shiyiju --timeout=300s
          kubectl rollout status deployment/user -n shiyiju --timeout=300s
          kubectl rollout status deployment/product -n shiyiju --timeout=300s
          kubectl rollout status deployment/order -n shiyiju --timeout=300s
          kubectl rollout status deployment/frontend -n shiyiju --timeout=300s